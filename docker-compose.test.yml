name: eywa-test

services:
  postgres:
    image: postgres:16-alpine
    container_name: eywa-postgres-test
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eywa
      PGDATA: /var/lib/postgresql/data/pgdata
    volumes:
      - postgres_test_data:/var/lib/postgresql/data
      - ./docker/init-db.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"  # Different port
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - eywa-test-network

  eywa:
    image: neyho/eywa:latest
    container_name: eywa-test
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: eywa
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: eywa
      POSTGRES_ADMIN_DB: postgres
      POSTGRES_ADMIN_USER: postgres
      POSTGRES_ADMIN_PASSWORD: eywa
      EYWA_HOME: /data/eywa
      EYWA_LOG_LEVEL: INFO
      EYWA_IAM_ENFORCE_ACCESS: "true"
      EYWA_SERVE: /opt/web
      EYWA_SERVER_HOST: 0.0.0.0
      EYWA_SERVER_PORT: 8080
      OAUTH_PERSISTENCE: db
      EYWA_IAM_ALLOWED_REDIRECTIONS: "http://localhost:8081/eywa/callback,http://localhost:8081/eywa/silent-callback"
      EYWA_IAM_ALLOWED_LOGOUTS: "http://localhost:8081/eywa"
      ADMIN_USERNAME: admin
      ADMIN_PASSWORD: admin
      JAVA_OPTS: "-Xmx2g -Xms512m"
    ports:
      - "8081:8080"  # Different port - access at :8081
    volumes:
      - eywa_test_data:/data/eywa
    networks:
      - eywa-test-network
    restart: unless-stopped

volumes:
  postgres_test_data:
  eywa_test_data:

networks:
  eywa-test-network:
    driver: bridge
